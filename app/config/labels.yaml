# Multilingual label dictionary for heuristic invoice field extraction.
# Languages: Faroese (fo), Danish (da), English (en).
# Matching is case-insensitive and ignores surrounding punctuation such as
# ":" and "#". Add synonyms here without touching code.
#
# Each scalar field declares:
#   type      : how the value is validated/normalised (date | token | text)
#   labels    : phrases that announce the value
#   direction : where the value sits relative to the label (right | below | any)

fields:
  invoiceno:
    type: token
    direction: right
    labels:
      - "fakturanr"
      - "faktura nr"
      - "fakturanummer"
      - "faktura nummer"
      - "rokningarnr"
      - "rokning nr"
      - "rokningarnummer"
      - "invoice no"
      - "invoice number"
      - "invoice #"
      - "inv no"
      - "bilagsnr"

  sentdate:
    type: date
    direction: right
    labels:
      - "fakturadato"
      - "faktura dato"
      - "dagfesting"
      - "útskrivað"
      - "skrivað"
      - "dato"
      - "date"
      - "invoice date"
      - "issue date"

  paydate:
    type: date
    direction: right
    labels:
      - "gjalddagi"
      - "gjaldsdagur"
      - "gjaldsdato"
      - "betalingsdato"
      - "betalingsfrist"
      - "forfaldsdato"
      - "forfald"
      - "due date"
      - "payment due"
      - "pay by"

# Vendor (supplier) name detection. The supplier is usually the sender block
# near the top of page 1. These labels are used when present; otherwise the
# heuristic falls back to the topmost text block on page 1.
vendor:
  labels:
    - "seljari"
    - "sølumaður"
    - "útvegari"
    - "leverandør"
    - "from"
    - "frá"
    - "supplier"
    - "vendor"
  # If any of these appear in a candidate block, it is the buyer, not the
  # vendor — skip it.
  buyer_keywords:
    - "keypari"
    - "móttakari"
    - "kunde"
    - "køber"
    - "bill to"
    - "ship to"
    - "sold to"

# Output fields proposed on import when the customer hasn't configured their
# own yet. Each is located by its labels (read-labels become editable synonyms);
# value beside/below the label. `suggested_key` is the editable export label.
suggest:
  - suggested_key: "VendorNo"
    category: "vendor"
    value_type: "number"
    labels: ["vtal", "vat no", "cvr", "reg no"]
  - suggested_key: "InvoiceNo"
    category: "invoice"
    value_type: "string"
    labels: ["fakturanr", "faktura nr", "fakturanummer", "rokningarnr", "invoice no", "invoice number", "bilagsnr"]
  - suggested_key: "InvoiceDate"
    category: "invoice"
    value_type: "date"
    labels: ["fakturadato", "dagfesting", "dato", "date", "invoice date"]
  - suggested_key: "DueDate"
    category: "payment"
    value_type: "date"
    labels: ["gjaldsdagur", "gjalddagi", "betalingsfrist", "forfaldsdato", "due date", "payment due"]
  - suggested_key: "TotalExclVat"
    category: "totals"
    value_type: "number"
    labels: ["í alt uttan mvg", "subtotal", "net"]
  - suggested_key: "Vat"
    category: "totals"
    value_type: "number"
    labels: ["mvg", "moms", "vat"]
  - suggested_key: "TotalInclVat"
    category: "totals"
    value_type: "number"
    labels: ["í alt við mvg", "at betala", "total"]
  - suggested_key: "AccountNo"
    category: "payment"
    value_type: "string"
    labels: ["gjaldslykil", "konto", "account", "iban", "reg.nr"]

# Line-item table column header keywords, mapped to canonical column names.
lines:
  # Phrases that mark the end of the line-item rows (the totals / summary block).
  # Matched as substrings of a normalised line; the scan stops at the first hit.
  terminators:
    - "í alt"
    - "i alt"
    - "tilsamans"
    - "samanlagt"
    - "subtotal"
    - "total"
    - "moms"
    - "mvg"
    - "at betala"
    - "at betale"
  columns:
    description:
      - "lýsing"
      - "vørulýsing"
      - "tekstur"
      - "tekst"
      - "beskrivelse"
      - "description"
      - "item"
      - "vøra"
    quantity:
      - "nøgd"
      - "tal"
      - "antal"
      - "antall"
      - "qty"
      - "quantity"
    unit:
      - "eind"
      - "unit"
      - "uom"
      - "mál"
      - "eining"
    unit_price:
      - "prísur"
      - "eindarprísur"
      - "stk pris"
      - "stykpris"
      - "enhedspris"
      - "unit price"
      - "price"
    amount:
      - "upphædd"
      - "tilsamans"
      - "samlað"
      - "beløb"
      - "beloeb"
      - "amount"
      - "total"
      - "line total"
