# nginx reverse proxy for Lesarin. Install to
# /etc/nginx/sites-available/lesarin and symlink into sites-enabled, then run
# `certbot --nginx -d your.domain` to obtain a certificate and rewrite this to
# listen on 443 with HTTPS automatically.
#
# Replace your.domain with the hostname pointed at this VPS.
server {
    listen 80;
    listen [::]:80;
    server_name your.domain;

    # Invoices can be up to 10 MB (the app's own ceiling); allow a little head-
    # room so nginx doesn't 413 before FastAPI can return a clean error.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
